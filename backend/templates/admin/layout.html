<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medcore Admin Portal</title>
    <style>
        :root { --blue: #1B4F8A; --teal: #1AAB8A; --bg: #f4f7fb; --text: #1a2b3c; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h1, h2 { color: var(--blue); }
        .nav { margin-bottom: 30px; display: flex; gap: 15px; border-bottom: 1px solid #eee; padding-bottom: 15px; align-items: center; }
        .nav a { text-decoration: none; color: var(--text); font-weight: 600; padding: 5px 10px; border-radius: 5px; }
        .nav a:hover { background: #eee; }
        .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; margin-top: 20px; }
        .card { border: 1px solid #eee; padding: 20px; border-radius: 8px; text-align: center; }
        .card-count { font-size: 32px; font-weight: 800; color: var(--teal); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; }
        th { background: #fafafa; font-size: 12px; text-transform: uppercase; color: #666; }
        .btn-del { color: #C62828; cursor: pointer; border: none; background: none; font-weight: bold; }
        .btn-del:hover { text-decoration: underline; }
        .editor { width: 100%; height: 500px; font-family: monospace; padding: 15px; border: 1px solid #ddd; border-radius: 5px; background: #2b2b2b; color: #a9b7c6; }
        .btn-save { background: var(--blue); color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin-top: 10px; }
        .tab-btn { padding: 8px 16px; border: 1px solid #ddd; background: #fff; cursor: pointer; border-radius: 4px; text-decoration: none; color: #333; }
        .tab-btn.active { background: var(--blue); color: #fff; border-color: var(--blue); }
    </style>
</head>
<body>
    <div class="container">
        <div class="nav">
            <a href="/interface/">Dashboard</a>
            <a href="/interface/raw?file=data">Edit Data</a>
            <a href="/interface/raw?file=users">Edit Users</a>
            <a href="/api/" target="_blank">API Root</a>
            <a href="/interface/logout" style="margin-left:auto; color: #C62828;">Logout</a>
        </div>
        
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <div style="padding: 10px; background: #e0f8f4; color: #0F6E56; border-radius: 5px; margin-bottom: 20px;">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </div>
</body>
</html>
