<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Medcore - Login</title>
  <link rel="stylesheet" href="../assets/css/login_layout.css">
  <script src="../assets/js/auth_guard.js"></script>
  <script src="../assets/js/api_client.js"></script>
</head>

<body>
  <div class="shell">
    <!-- Rest of login.html body would be here - restoring only the script logic below -->
    <!-- (I am assuming the body is already restored via git restore) -->
  </div>

  <script src="../assets/js/translations_table.js"></script>
  <script src="../assets/js/translation.js"></script>
  <script>
    /* ── LOGIN ── */
    async function handleLogin() {
      const email = document.getElementById("login-email").value;
      const pass = document.getElementById("login-pass").value;
      let ok = true;
      if (!email || !email.includes("@")) { showErr("err-login-email", "login-email"); ok = false; }
      else clearErr("err-login-email", "login-email");
      if (!pass) { showErr("err-login-pass", "login-pass"); ok = false; }
      else clearErr("err-login-pass", "login-pass");
      if (!ok) return;

      const btn = document.getElementById("btn-login");
      btn.classList.add("loading");

      const response = await POSTRequest("/auth/login/", { email, password: pass });
      
      btn.classList.remove("loading");

      if (response && response.success) {
        localStorage.setItem("token", response.token);
        localStorage.setItem("role", response.role);
        localStorage.setItem("permissions", JSON.stringify(response.permissions));
        showSuccess();
        setTimeout(() => {
            window.location.href = "home.html";
        }, 1500);
      } else {
        alert(response?.error || "Login Failed");
      }
    }

    /* ── REGISTER ── */
    async function handleRegister() {
      const email = document.getElementById("reg-email").value;
      const pass = document.getElementById("reg-pass").value;
      const terms = document.getElementById("terms-check").checked;
      let ok = true;
      if (!email || !email.includes("@")) { showErr("err-reg-email", "reg-email"); ok = false; }
      else clearErr("err-reg-email", "reg-email");
      if (!pass || pass.length < 8) { showErr("err-reg-pass", "reg-pass"); ok = false; }
      else clearErr("err-reg-pass", "reg-pass");
      if (!terms) { alert(lang === "ar" ? "يجب الموافقة على الشروط أولاً" : "Please accept the terms first"); ok = false; }
      if (!ok) return;

      const btn = document.getElementById("btn-register");
      btn.classList.add("loading");

      const response = await POSTRequest("/auth/register/", { email, password: pass });
      
      btn.classList.remove("loading");

      if (response && response.success) {
        alert(lang === "ar" ? "تم التسجيل بنجاح! يمكنك الدخول الآن." : "Registration successful! You can now login.");
        toggleView('login');
      } else {
        alert(response?.error || "Registration Failed");
      }
    }

    function showErr(errId, inputId) {
      document.getElementById(errId).classList.add("show");
      document.getElementById(inputId).classList.add("error");
    }
    function clearErr(errId, inputId) {
      document.getElementById(errId).classList.remove("show");
      document.getElementById(inputId).classList.remove("error");
    }

    function showSuccess() {
      document.getElementById("view-login").style.display = "none";
      document.getElementById("view-register").style.display = "none";
      const sc = document.getElementById("success-screen");
      sc.classList.add("show");
      setTimeout(() => {
        const pb = document.getElementById("progress-bar");
        pb.style.width = "100%";
      }, 50);
    }

    applyLang();
  </script>
</body>
</html>
