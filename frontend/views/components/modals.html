  <!-- MODALS -->
  <div class="modal-bg" id="modal-addCompany">
    <div class="modal">
      <div class="modal-head">
        <h3 id="m-addco-title" data-langId="m-addco-title">Add Insurance Company</h3><button class="modal-close"
          onclick="closeModal('addCompany')">×</button>
      </div>
      <div class="modal-body">
          <div class="form-grid-2">
          <div class="form-row"><label id="m-coname" data-langId="m-coname">Company Name</label><input type="text"
              name="name" placeholder="e.g. Misr Insurance"></div>
          <div class="form-row"><label data-langId="lbl-type">Type</label><select name="type">
              <option>National</option>
              <option>Private</option>
              <option>International</option>
            </select></div>
        </div>
        <div class="form-grid-2">
          <div class="form-row"><label id="m-costart" data-langId="m-costart">Contract Start</label><input type="date" name="start"></div>
          <div class="form-row"><label id="m-coend" data-langId="m-coend">Contract End</label><input type="date" name="end"></div>
        </div>
        <div class="form-row"><label id="m-colimit" data-langId="m-colimit">Coverage Limit (EGP)</label><input type="number" name="limit"
            placeholder="500000"></div>
        <div class="form-row"><label id="m-cocontact" data-langId="m-cocontact">Contact Person</label><input type="text" name="contact"
            placeholder="Name &amp; phone"></div>
      </div>
      <div class="modal-footer"><button class="btn-outline" onclick="closeModal('addCompany')"
          id="m-cancel" data-langId="m-cancel">Cancel</button><button class="btn-primary btn-sm" id="m-save" data-langId="m-save" onclick="saveModalData('addCompany')">Save Company</button></div>
    </div>
  </div>

  <div class="modal-bg" id="modal-addClaim">
    <div class="modal">
      <div class="modal-head">
        <h3 id="m-addcl-title" data-langId="m-addcl-title">New Claim</h3><button class="modal-close" onclick="closeModal('addClaim')">×</button>
      </div>
      <div class="modal-body">
        <div class="form-grid-2">
          <div class="form-row"><label id="m-clpat" data-langId="m-clpat">Patient</label><input type="text" name="patient" placeholder="Patient name"></div>
          <div class="form-row"><label id="m-clins" data-langId="m-clins">Insurance Company</label><select name="ins">
              <option>Misr Insurance</option>
              <option>AXA Egypt</option>
              <option>MetLife Egypt</option>
              <option>Allianz Egypt</option>
            </select></div>
        </div>
        <div class="form-grid-2">
          <div class="form-row"><label id="m-clamt" data-langId="m-clamt">Amount (EGP)</label><input type="number" name="amount" placeholder="0"></div>
          <div class="form-row"><label id="m-cldate" data-langId="m-cldate">Service Date</label><input type="date" name="date"></div>
        </div>
        <div class="form-row"><label id="m-clnotes" data-langId="m-clnotes">Notes</label><input type="text" name="notes"
            placeholder="Diagnosis / procedure..."></div>
      </div>
      <div class="modal-footer"><button class="btn-outline" onclick="closeModal('addClaim')"
          id="m-cancel2" data-langId="m-cancel2">Cancel</button><button class="btn-primary btn-sm" id="m-save2" data-langId="m-save2" onclick="saveModalData('addClaim')">Submit Claim</button></div>
    </div>
  </div>

  <div class="modal-bg" id="modal-addPatient">
    <div class="modal">
      <div class="modal-head">
        <h3 id="m-addpat-title" data-langId="m-addpat-title">New Patient</h3><button class="modal-close"
          onclick="closeModal('addPatient')">×</button>
      </div>
      <div class="modal-body">
        <div class="form-grid-2">
          <div class="form-row"><label id="m-patname" data-langId="m-patname">Name</label><input type="text" id="inp-patname" name="name"
              placeholder="Patient Name"></div>
          <div class="form-row"><label id="m-patage" data-langId="m-patage">Age</label><input type="number" id="inp-patage" name="age" placeholder="Age">
          </div>
        </div>
        <div class="form-grid-2">
          <div class="form-row"><label id="m-patphone" data-langId="m-patphone">Phone Number</label><input type="tel" id="inp-patphone" name="phone"
              placeholder="01X-XXXX-XXXX"></div>
          <div class="form-row"><label id="m-patwa" data-langId="m-patwa">Whatsapp Number</label><input type="tel" id="inp-patwa" name="wa"
              placeholder="01X-XXXX-XXXX"></div>
        </div>
        <div class="form-row"><label id="m-patnid" data-langId="m-patnid">National ID</label><input type="text" id="inp-patnid" name="nid"
            placeholder="14-digit National ID"></div>
        <div class="form-grid-2">
          <div class="form-row">
            <label id="m-patins" data-langId="m-patins">Insurance Company</label>
            <select id="inp-patins" name="ins">
              <option>None</option>
              <option>Misr Insurance</option>
              <option>AXA Egypt</option>
              <option>MetLife Egypt</option>
              <option>Allianz Egypt</option>
            </select>
          </div>
          <div class="form-row">
            <label id="m-patins2" data-langId="m-patins2">Secondary Insurance</label>
            <select id="inp-patins2" name="ins2">
              <option>None</option>
              <option>Misr Insurance</option>
              <option>AXA Egypt</option>
              <option>MetLife Egypt</option>
              <option>Allianz Egypt</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <label id="m-patdoc" data-langId="m-patdoc">Doctor</label>
          <select id="inp-patdoc" name="doctor">
            <option>Dr. Nour</option>
            <option>Dr. Mostafa</option>
            <option>Dr. Sara</option>
          </select>
        </div>
      </div>
      <div class="modal-footer"><button class="btn-outline" onclick="closeModal('addPatient')"
          id="m-cancel3" data-langId="m-cancel3">Cancel</button><button class="btn-primary btn-sm" id="m-save3" data-langId="m-save3" onclick="saveModalData('addPatient')">Save
          Patient</button></div>
    </div>
  </div>
